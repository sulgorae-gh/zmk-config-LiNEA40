name: ZMK Drawer Final
on:
  workflow_dispatch:
  push:
    paths:
      - "config/LiNEA40.keymap"
      - "linea40.json"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Keymap Drawer
        run: pip install keymap-drawer

      - name: Parse and Draw
        run: |
          python3 -c "
          import re
          def parse():
              with open('config/LiNEA40.keymap', 'r') as f:
                  content = f.read()
              # bindings = <...> の中身を抽出
              layers_raw = re.findall(r'bindings\s*=\s*<(.*?)>', content, re.DOTALL)
              if not layers_raw: return
              
              with open('keymap.yaml', 'w') as f:
                  # 物理レイアウト情報を記述
                  f.write(\"layout: {qmk_info_json: 'linea40.json'}\\n\")
                  f.write(\"layers:\\n\")
                  for i, raw in enumerate(layers_raw):
                      # キーを分割
                      keys = [k.strip() for k in raw.replace('\\n', ' ').split(' ') if k.strip()]
                      f.write(f\"  L{i}:\\n\")
                      # 重要な修正：各キーを \" \" で囲んで YAML のアンカーエラーを回避
                      quoted_keys = [f'\"{k}\"' for k in keys]
                      f.write(f\"    - [{', '.join(quoted_keys)}]\\n\")
          parse()
          "
          # エラーの原因になる parse 工程を飛ばして、直接 draw を実行
          keymap draw keymap.yaml > keymap.svg

      - name: Commit and Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add keymap.svg keymap.yaml
          if ! git diff --staged --quiet; then
            git commit -m "Update keymap visualization"
            git push origin main
          fi
