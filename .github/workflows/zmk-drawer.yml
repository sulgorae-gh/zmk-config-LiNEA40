name: ZMK Drawer Final
on:
  workflow_dispatch:
  push:
    paths:
      - "config/**.keymap"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 読み書き権限を明示
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 履歴をすべて取得してエラーを防ぐ

      - name: Install Keymap Drawer
        run: pip install keymap-drawer

      - name: Draw Keymap
        run: |
          # 1. 物理レイアウト情報を込めた keymap.yaml をベースに、現在のキーマップをパース
          # ※LiNEA40の定義がないため、強引に標準レイアウトを指定して作成します
          keymap parse -z config/LiNEA40.keymap -b keymap.yaml > keymap_final.yaml
          
          # 2. 出来上がった最終的な YAML から SVG を描画
          keymap draw keymap_final.yaml > keymap.svg
          
          # 3. 後のためにファイル名を整理
          mv keymap_final.yaml keymap.yaml

      - name: Commit and Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add keymap.svg keymap.yaml
          # 変更がある場合のみコミット
          if ! git diff --staged --quiet; then
            git commit -m "Update keymap visualization"
            git push origin main
          else
            echo "No changes to commit"
          fi
