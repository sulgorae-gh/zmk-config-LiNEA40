name: ZMK Drawer Final
on:
  workflow_dispatch:
  push:
    paths:
      - "config/LiNEA40.keymap"
      - "linea40.json"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Keymap Drawer
        run: pip install keymap-drawer

      - name: Draw Keymap
        run: |
          # 1. まず解析だけして中身を取り出す
          keymap parse -z config/LiNEA40.keymap > keymap_content.yaml || true
          
          # 2. 物理レイアウト(linea40.json)の内容を、解析したデータの頭に強引にくっつける
          # これでツールは「名前」ではなく「座標データそのもの」を見るようになります
          echo "layout:" > keymap.yaml
          echo "  qmk_info_json: 'linea40.json'" >> keymap.yaml
          cat keymap_content.yaml >> keymap.yaml
          
          # 3. 描画
          # ※ parse時のエラーを無視して進むため、ファイルの中身が空でないか確認
          keymap draw keymap.yaml > keymap.svg

      - name: Commit and Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add keymap.svg keymap.yaml
          if ! git diff --staged --quiet; then
            git commit -m "Update keymap visualization"
            git push origin main
          fi
