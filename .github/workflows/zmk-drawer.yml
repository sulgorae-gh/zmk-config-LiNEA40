name: ZMK Drawer Final
on:
  workflow_dispatch:
  push:
    paths:
      - "config/**.keymap"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Keymap Drawer
        run: pip install keymap-drawer

      - name: Draw Keymap
        run: |
          # 1. あなたの .keymap を解析して YAML に変換（レイアウト指定なし）
          keymap parse -z config/LiNEA40.keymap > keymap_data.yaml
          
          # 2. 上で作った keymap.yaml (レイアウト定義) と合体させる
          # データの構造だけを流し込む強引な手法です
          keymap draw keymap_data.yaml > keymap.svg

      - name: Commit and Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add keymap.svg keymap_data.yaml
          if ! git diff --staged --quiet; then
            git commit -m "Update keymap visualization"
            git push origin main
          fi
