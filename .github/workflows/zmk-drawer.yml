name: ZMK Drawer Final
on:
  workflow_dispatch:
  push:
    paths:
      - "config/LiNEA40.keymap"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Keymap Drawer
        run: pip install keymap-drawer

      - name: Draw Keymap
        run: |
          # 1. あなたの .keymap ファイルから直接「描画用データ」を無理やり引っこ抜きます
          # (解析エラーを避けるため、解析コマンドを通さずに直接描画に回します)
          keymap draw --select-layers Base Lower Raise -j '{"layout": {"qmk_keyboard": "linea40"}}' config/LiNEA40.keymap > keymap.svg

      - name: Commit and Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add keymap.svg
          git commit -m "Update keymap visualization" || exit 0
          git push origin main
