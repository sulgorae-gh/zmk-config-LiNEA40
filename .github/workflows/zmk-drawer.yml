name: ZMK Drawer Final
on:
  workflow_dispatch:
  push:
    paths:
      - "config/LiNEA40.keymap"
      - "linea40.json"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Keymap Drawer
        run: pip install keymap-drawer

      - name: Draw Keymap
        run: |
          # 1. あなたの .keymap を、自作の設計図 (linea40.json) を使って解析
          keymap parse -z config/LiNEA40.keymap -l linea40.json > keymap.yaml
          
          # 2. 描画
          keymap draw keymap.yaml > keymap.svg

      - name: Commit and Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add keymap.svg keymap.yaml
          if ! git diff --staged --quiet; then
            git commit -m "Update keymap visualization"
            git push origin main
          fi
