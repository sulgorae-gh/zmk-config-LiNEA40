name: ZMK Drawer Final
on:
  workflow_dispatch:
  push:
    paths:
      - "config/LiNEA40.keymap"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Keymap Drawer
        run: pip install keymap-drawer

      - name: Parse and Draw Keymap
        run: |
          # 1. まずは .keymap を解析して YAML にする（この時点ではレイアウト不明でエラーが出る可能性が高い）
          # エラーを無視して進めるために "|| true" をつけますが、中身は書き出されます
          keymap parse -z config/LiNEA40.keymap > keymap_temp.yaml || true
          
          # 2. 生成された YAML の先頭に、私たちが苦労して見つけた「正しいレイアウト定義」を上書き合体させます
          echo 'layout: {ortho_layout: {split: false, rows: 4, columns: 12}}' > layout_head.yaml
          cat layout_head.yaml keymap_temp.yaml > keymap_final.yaml
          
          # 3. 出来上がった完璧な YAML で描画
          keymap draw keymap_final.yaml > keymap.svg

      - name: Commit and Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add keymap.svg
          if ! git diff --staged --quiet; then
            git commit -m "Update keymap visualization from source"
            git push origin main
          fi
