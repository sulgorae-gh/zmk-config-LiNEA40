name: ZMK Drawer Final
on:
  workflow_dispatch:
  push:
    paths:
      - "config/**.keymap"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 読み書き権限を明示
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 履歴をすべて取得してエラーを防ぐ

      - name: Install Keymap Drawer
        run: pip install keymap-drawer
        
      - name: Draw Keymap
        run: |
          # 1. LiNEA40 という名前を一時的に "linea40"（ツールが知っている名前）に置換してパース
          sed 's/LiNEA40/linea40/g' config/LiNEA40.keymap > temp.keymap
          
          # 2. ツールが知っている名前として解析させる
          keymap parse -z temp.keymap > keymap.yaml
          
          # 3. 描画する
          keymap draw keymap.yaml > keymap.svg

      - name: Commit and Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add keymap.svg keymap.yaml
          # 変更がある場合のみコミット
          if ! git diff --staged --quiet; then
            git commit -m "Update keymap visualization"
            git push origin main
          else
            echo "No changes to commit"
          fi
