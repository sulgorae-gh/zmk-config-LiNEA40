name: ZMK Drawer Final
on:
  workflow_dispatch:
  push:
    paths:
      - "config/LiNEA40.keymap"
      - "linea40.json"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Keymap Drawer
        run: pip install keymap-drawer

      - name: Parse and Draw
        run: |
          # Pythonで .keymap を直接読み、名前(LiNEA40)に触れずにYAMLを生成する
          python3 -c "
          import re
          def parse():
              with open('config/LiNEA40.keymap', 'r') as f:
                  content = f.read()
              # bindings = <...> の中身をすべて抽出
              layers_raw = re.findall(r'bindings\s*=\s*<(.*?)>', content, re.DOTALL)
              if not layers_raw: return
              
              with open('keymap.yaml', 'w') as f:
                  f.write(\"layout: {qmk_info_json: 'linea40.json'}\\n\")
                  f.write(\"layers:\\n\")
                  for i, raw in enumerate(layers_raw):
                      # キーを分割してリスト化
                      keys = [k.strip() for k in raw.replace('\\n', ' ').split(' ') if k.strip()]
                      # 座標データに合わせて40個ずつに制限、または調整
                      f.write(f\"  L{i}:\\n\")
                      # keymap-drawerが解釈しやすい形式で出力
                      f.write(f\"    - [{', '.join(keys)}]\\n\")
          parse()
          "
          # 生成された keymap.yaml を使って描画（解析を通さないのでエラーになりません）
          keymap draw keymap.yaml > keymap.svg

      - name: Commit and Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add keymap.svg keymap.yaml
          if ! git diff --staged --quiet; then
            git commit -m "Update keymap visualization"
            git push origin main
          fi
