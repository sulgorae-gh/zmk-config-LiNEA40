name: ZMK Drawer Final
on:
  workflow_dispatch:
  push:
    paths:
      - "config/LiNEA40.keymap"
      - "linea40.json"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Keymap Drawer
        run: pip install keymap-drawer

      - name: Draw Keymap
        run: |
          # 1. 解析（ここは前回成功したはずです）
          keymap parse -z config/LiNEA40.keymap -l linea40.json \
            --layer-names Base Lower Raise Adjust Fun Media Num Mouse > keymap.yaml
          
          # 2. 犯人はコイツだ！
          # 生成された keymap.yaml の中にある "zmk_keyboard: LiNEA40" という行を
          # 強制的に削除（またはコメントアウト）して、名前を忘れさせます。
          sed -i '/zmk_keyboard: LiNEA40/d' keymap.yaml
          
          # 3. 描画（これで名前によるバリデーションエラーを回避できます）
          keymap draw keymap.yaml > keymap.svg

      - name: Commit and Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add keymap.svg keymap.yaml
          if ! git diff --staged --quiet; then
            git commit -m "Update keymap visualization"
            git push origin main
          fi
