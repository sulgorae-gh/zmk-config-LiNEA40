name: Draw ZMK keymaps

on:
  workflow_dispatch:  # 手動トリガー（テスト用）
  push:
    paths:
      - "config/LiNEA40.keymap"
      - "config/LiNEA40_hardware.dtsi"
      - "keymap_drawer.config.yaml"

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@main
    permissions:
      contents: write
    with:
      keymap_patterns: "config/LiNEA40.keymap"
      config_path: "keymap_drawer.config.yaml"
      output_folder: "keymap-drawer"
      parse_args: "LiNEA40:'-c 10'"
      draw_args: ""

  pdf:
    needs: draw
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Pull latest (drawジョブのコミットを取得)
        run: git pull --rebase origin main

      - name: Install Inkscape
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y inkscape

      - name: Convert SVG to PDF
        run: |
          for svg in keymap-drawer/*.svg; do
            [ -f "$svg" ] && inkscape "$svg" --export-filename="${svg%.svg}.pdf"
          done

      - name: Commit PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add keymap-drawer/*.pdf
          git diff --cached --quiet || \
            git commit -m "chore: update keymap PDF" && git push
