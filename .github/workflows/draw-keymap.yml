name: Draw ZMK keymaps
on:
  workflow_dispatch:
  push:
    paths:
      - "config/**.keymap"
      - "keymap_drawer.config.yaml"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Keymap Drawer
        run: pip install keymap-drawer

      - name: Parse and Draw
        run: |
          # linea40のkeymapファイルの場所に合わせて修正
          keymap parse -z config/linea40.keymap > keymap.yaml
          keymap draw keymap.yaml > keymap.svg

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add keymap.svg keymap.yaml
          git commit -m "Update keymap visualization" || exit 0
          git push
