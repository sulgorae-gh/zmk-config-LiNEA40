layout:
  ortho_layout:  # ここを ortho から ortho_layout に修正しました
    split: false
    rows: 4
    cols: 12
layers:
  Base:
  # 1行目
  - [Q, W, E, R, T, '', '', Y, U, I, O, P]
  # 2行目
  - [A, S, D, F, G, '', '', H, J, K, L, ';']
  # 3行目
  - [Z, X, C, V, B, '', '', N, M, ',', '.', /]
  # 4行目（ご指定の配置）
